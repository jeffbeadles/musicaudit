# musicaudit sample configuration
#
# Copy to:
#   ~/.config/musicaudit/config.yaml
#
# All settings are optional. Values shown are examples.

# ----------------------------------------------------------------------
# Library
# ----------------------------------------------------------------------

# Default filesystem root.
# This path is used by default if --path is specified with no argument
# Can always be overridden with --path /path/to/music_collection
music_root: ~/Music

# Default Apple Music/iTunes XML export.
# This path is used by default if --apple-library is specified with no argument
# Can always be overridden with --apple-library /path/to/Library.xml
apple_library: ~/Music/AppleMusic/Library.xml

# ----------------------------------------------------------------------
# General Options
# ----------------------------------------------------------------------

# Default bitrate threshold (kbps) used unless overridden by a rule
# or the command line.
low_bitrate: 256

# How bitrate information is displayed.
# Values:
#   summary  - summarize ranges (recommended)
#   all      - show every bitrate encountered
bitrate_report: summary

# Maximum number of detail rows shown in reports.
# Use 0 to suppress details.
max_details: 25

# Additional globally-known comment tokens.
#
# FAV is always recognized automatically and does not need to be listed.
known_tokens:
  - LIVE
  - DEMO

# ----------------------------------------------------------------------
# Rule Configuration
# ----------------------------------------------------------------------

# Note: Unless you only want a small subset of explicit rules to be run, it is best
# to leave enabled_rules commented out, and only use disabled_rules.
# This way, as new rules are added to musicaudit, they will be checked.
#
# Optional list of rules enabled by default.
# If omitted, all rules are enabled.
#
# enabled_rules:
#   - duplicate-track
#   - empty-standard-playlist
#   - invalid-rating
#   - low-bitrate
#   - missing-album-artist
#   - missing-artwork
#   - missing-files
#   - missing-lyrics
#   - missing-rating
#   - unknown-token
#   - unreadable-file
#   - xml-tag-mismatch
# ...

# Optional list of rules to be disabled. (Many users will want to disable these)
# disabled_rules:
#   - invalid-rating
#   - missing-rating
#   - unknown-token
#

rules:

  # ------------------------------------------------------------
  # Warn about tracks below a minimum bitrate.
  # CLI --low-bitrate overrides this value.
  # ------------------------------------------------------------
  low-bitrate:
    enabled: true

    # Minimum acceptable bitrate (kbps)
    minimum: 256

    # Optional severity override
    # INFO | WARN | ERROR
    level: WARN

  # ------------------------------------------------------------
  # Detect comment tokens that are not recognized.
  # ------------------------------------------------------------
  unknown-token:
    enabled: true

    # Tokens that are valid for your collection.
    #
    # These become part of the effective known token list and
    # will not be reported as unknown.
    allowed:
      - LIVE
      - DEMO

    level: WARN

  # ------------------------------------------------------------
  # Tracks missing an S1-S5 rating token.
  # This is a method that some people use in the comments to
  #  Store rating information, so it can be saved outside of the
  #  iTunes environment.  If enabled, then this token must be
  #  set for each file in the music collection
  # ------------------------------------------------------------
  missing-rating:
    enabled: false
    level: ERROR

  # ------------------------------------------------------------
  # Duplicate tracks.
  # ------------------------------------------------------------
  duplicate-track:
    enabled: true
    level: WARN

  # ------------------------------------------------------------
  # Empty standard playlists.
  #
  # Empty Smart Playlists are intentionally ignored because many
  # validation playlists are expected to be empty.
  # ------------------------------------------------------------
  empty-standard-playlist:
    enabled: true
    level: WARN

# ----------------------------------------------------------------------
# Notes
# ----------------------------------------------------------------------
#
# Configuration precedence (highest to lowest):
#
#   1. Command-line options
#   2. Rule-specific settings
#   3. Global settings
#   4. Built-in defaults
#
# Example:
#
#   musicaudit rules --low-bitrate 192
#
# overrides both:
#
#   low_bitrate: 256
#
# and:
#
#   rules:
#     low-bitrate:
#       minimum: 128
#
# The effective configuration can be displayed with:
#
#   musicaudit rules --show-config (--path || --apple-library)
#
