name: Lint

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Ruff Lint and Format Checks
        uses: astral-sh/ruff-action@v3
        with:
          # This checks both code quality rules and formatting consistency
          args: "check --output-format=github . && ruff format --check ."

