[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "musicaudit"
version = "1.0.0"
description = "Read-only validation tool for digital music collections"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [
  { name = "Jeff Beadles" }
]
dependencies = [
  "mutagen>=1.47",
  "PyYAML>=6.0"
]

[project.scripts]
musicaudit = "musicaudit.cli:main"
